name: 'SDK | VirusTotal Acceptance Tests'

on:
  workflow_dispatch:  # Allow manual trigger
  schedule:
    # Run weekly on Monday at 2 AM UTC to avoid rate limit issues
    - cron: '0 2 * * 1'

permissions:
  contents: read

jobs:
  acceptance:
    name: '🧪 Run VirusTotal Acceptance Tests'
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Check Out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
          cache: true
          go-version: stable

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run Acceptance Tests
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          VT_VERBOSE: true
          GOTESTSUM_FORMAT: testname
        run: |
          if [ -z "$VT_API_KEY" ]; then
            echo "::warning::VT_API_KEY secret is not set. Skipping acceptance tests."
            exit 0
          fi
          
          echo "::group::🧪 VirusTotal Acceptance Tests Setup"
          echo "========================================================================"
          echo "  Running VirusTotal Acceptance Tests"
          echo "========================================================================"
          echo "  Rate limit: 4 requests/minute (16 seconds between tests)"
          echo "  This will take approximately 3-4 minutes to complete"
          echo "========================================================================"
          echo "::endgroup::"
          echo ""
          
          gotestsum \
            --format testname \
            --no-color=false \
            -- -timeout 30m ./virustotal/acceptance/...


      - name: Comment on Failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const issue_number = context.issue.number;
            const run_url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Acceptance Tests Failed',
              body: `The scheduled acceptance tests have failed.\n\nSee the [workflow run](${run_url}) for details.`,
              labels: ['bug', 'acceptance-tests']
            });
